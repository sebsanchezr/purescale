<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="200" height="200" fill="#000000" rx="20"/>
  <!-- Growth arrow icon centred -->
  <path d="M 60 140 Q 75 110 90 90 T 115 65" stroke="url(#g)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 115 65 L 100 80 M 115 65 L 130 80" stroke="url(#g)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- PureScale text -->
  <text x="100" y="170" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">
    <tspan fill="url(#g)">Pure</tspan><tspan fill="white">Scale</tspan>
  </text>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
